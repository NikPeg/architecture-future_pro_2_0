name: Terraform CI/CD

on:
  push:
    paths:
      - 'envs/**'
      - 'modules/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'envs/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
        type: choice
        options: [dev, stage, prod]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent runs for the same branch/env to avoid state conflicts.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Determine which environment to deploy ────────────────────────────────────
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.resolve.outputs.env }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=stage" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

  # ── terraform init + plan ─────────────────────────────────────────────────────
  plan:
    needs: resolve-env
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/${{ needs.resolve-env.outputs.env }}
    env:
      # Backend credentials — YOS static access key for the service account.
      # Never store these in code; they must be set as GitHub repository secrets.
      AWS_ACCESS_KEY_ID:     ${{ secrets.YC_STORAGE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_STORAGE_SECRET_KEY }}
      # Sensitive Terraform variables injected from secrets.
      TF_VAR_yc_token:       ${{ secrets.YC_TOKEN }}
      TF_VAR_yc_cloud_id:    ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.4"

      - name: Inject per-environment secrets
        id: env-secrets
        # Dynamic secret lookup is not supported in GitHub Actions expressions,
        # so we use a shell case statement to select the right secret values.
        run: |
          ENV="${{ needs.resolve-env.outputs.env }}"
          case "$ENV" in
            dev)
              echo "TF_VAR_yc_folder_id=${{ secrets.DEV_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.DEV_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
            stage)
              echo "TF_VAR_yc_folder_id=${{ secrets.STAGE_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.STAGE_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
            prod)
              echo "TF_VAR_yc_folder_id=${{ secrets.PROD_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.PROD_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
          esac

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        run: terraform plan -var-file=ci.tfvars -out=tfplan

      # Save the compiled plan so the apply job uses exactly what was reviewed.
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.resolve-env.outputs.env }}-${{ github.run_id }}
          path: envs/${{ needs.resolve-env.outputs.env }}/tfplan
          retention-days: 1

  # ── terraform apply ───────────────────────────────────────────────────────────
  apply:
    needs: [resolve-env, plan]
    # Apply only on main/develop or manual dispatch — all other branches get plan only.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    # Assigning an environment name enables GitHub Environment protection rules.
    # Configure "prod" in repo Settings → Environments with required reviewers
    # to enforce a manual approval gate before any production apply.
    environment: ${{ needs.resolve-env.outputs.env }}
    defaults:
      run:
        working-directory: envs/${{ needs.resolve-env.outputs.env }}
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.YC_STORAGE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_STORAGE_SECRET_KEY }}
      TF_VAR_yc_token:       ${{ secrets.YC_TOKEN }}
      TF_VAR_yc_cloud_id:    ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.4"

      - name: Inject per-environment secrets
        run: |
          ENV="${{ needs.resolve-env.outputs.env }}"
          case "$ENV" in
            dev)
              echo "TF_VAR_yc_folder_id=${{ secrets.DEV_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.DEV_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
            stage)
              echo "TF_VAR_yc_folder_id=${{ secrets.STAGE_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.STAGE_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
            prod)
              echo "TF_VAR_yc_folder_id=${{ secrets.PROD_YC_FOLDER_ID }}" >> $GITHUB_ENV
              echo "TF_VAR_subnet_id=${{ secrets.PROD_SUBNET_ID }}"        >> $GITHUB_ENV
              ;;
          esac

      - name: terraform init
        run: terraform init

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.resolve-env.outputs.env }}-${{ github.run_id }}
          path: envs/${{ needs.resolve-env.outputs.env }}

      # Apply the exact plan that was reviewed — no recalculation, no drift.
      - name: terraform apply
        run: terraform apply -auto-approve tfplan
